name: Announce branch-off and minor release

on:
  schedule:
    - cron: "0 8 10-19 * *"
  workflow_dispatch:
    inputs:
      override_date:
        description: "Override today's date for testing (YYYY-MM-DD)"
        required: false
        type: string

jobs:
  check-and-notify:
    name: Check date and notify Slack
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
      - run: npm ci
      - run: npm run build

      - name: Get Shopware version
        id: version
        uses: shopware/github-actions/shopware-version@main

      - name: Calculate next minor version
        id: next-version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST=$(gh api repos/shopware/shopware/releases/latest --jq '.tag_name')
          LATEST="${LATEST#v}"
          IFS='.' read -r -a parts <<< "$LATEST"
          parts[2]=$((parts[2] + 1))
          echo "next_minor=${parts[0]}.${parts[1]}.${parts[2]}.0" >> "$GITHUB_OUTPUT"

      - name: Calculate release dates
        id: dates
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          OVERRIDE_DATE: ${{ inputs.override_date }}
        with:
          script: |
            const { computeReleaseSchedule } = await import('${{ github.workspace }}/dist/index.mjs');
            const schedule = computeReleaseSchedule(new Date(), process.env.OVERRIDE_DATE);
            core.setOutput('today', schedule.today);
            core.setOutput('announcement_date', schedule.announcementDate);
            core.setOutput('onprem_release_date', schedule.onpremReleaseDate);
            core.setOutput('branchoff_date', schedule.branchoffDate);
            core.setOutput('notify', String(schedule.notify));

      - name: Debug output
        run: |
          echo "today:               ${{ steps.dates.outputs.today }}"
          echo "onprem_release_date: ${{ steps.dates.outputs.onprem_release_date }}"
          echo "branchoff_date:      ${{ steps.dates.outputs.branchoff_date }}"
          echo "announcement_date:   ${{ steps.dates.outputs.announcement_date }}"
          echo "notify:              ${{ steps.dates.outputs.notify }}"
          echo "next_minor_release:  ${{ steps.next-version.outputs.next_minor }}"

      - name: Send Slack notification
        if: steps.dates.outputs.notify == 'true'
        run: |
          curl -s -X POST "${{ secrets.ANNOUNCE_MINOR_RELEASE_SLACK_WEBHOOK_URL }}" \
            -H 'Content-Type: application/json' \
            -d '{
              "onprem_release_date": "${{ steps.dates.outputs.onprem_release_date }}",
              "branchoff_date": "${{ steps.dates.outputs.branchoff_date }}",
              "next_minor_release": "${{ steps.next-version.outputs.next_minor }}"
            }'
