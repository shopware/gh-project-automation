name: Announce branch-off and minor release

on:
  schedule:
    - cron: "0 8 10-19 * *"
  workflow_dispatch:
    inputs:
      override_date:
        description: "Override today's date for testing (YYYY-MM-DD)"
        required: false
        type: string

jobs:
  check-and-notify:
    name: Check date and notify Slack
    runs-on: ubuntu-latest
    steps:
      - name: Calculate next minor version
        id: next-version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST=$(gh api repos/shopware/shopware/releases/latest --jq '.tag_name')
          LATEST="${LATEST#v}"
          IFS='.' read -r -a parts <<< "$LATEST"
          parts[2]=$((parts[2] + 1))
          echo "next_minor=${parts[0]}.${parts[1]}.${parts[2]}.0" >> "$GITHUB_OUTPUT"

      - name: Calculate release dates
        id: dates
        run: |
          TODAY_YEAR=$(date "+%Y")
          TODAY_MONTH=$(date "+%m")
          FIRST_DAY_NEXT_MONTH=$(date -d "$TODAY_YEAR-$TODAY_MONTH-01 +1 month" "+%Y-%m-%d")

          NEXT_MONTH=$(date -d "$FIRST_DAY_NEXT_MONTH" "+%m")
          NEXT_YEAR=$(date -d "$FIRST_DAY_NEXT_MONTH" "+%Y")

          for DAY in $(seq 1 7); do
            DATE_CHECK="$NEXT_YEAR-$NEXT_MONTH-$(printf "%02d" $DAY)"
            DOW=$(date -d "$DATE_CHECK" +%u)
            if [ "$DOW" -eq 1 ]; then
              FIRST_MONDAY="$DATE_CHECK"
              break
            fi
          done

          TODAY="${{ inputs.override_date }}"
          TODAY="${TODAY:-$(date +%Y-%m-%d)}"
          BRANCHOFF=$(date -d "$FIRST_MONDAY - 14 days" +%Y-%m-%d)
          ANNOUNCEMENT=$(date -d "$BRANCHOFF - 5 days" +%Y-%m-%d)

          echo "today=$TODAY" >> "$GITHUB_OUTPUT"
          echo "announcement_date=$ANNOUNCEMENT" >> "$GITHUB_OUTPUT"
          echo "onprem_release_date=$FIRST_MONDAY" >> "$GITHUB_OUTPUT"
          echo "branchoff_date=$BRANCHOFF" >> "$GITHUB_OUTPUT"

          if [ "$TODAY" = "$ANNOUNCEMENT" ]; then
            echo "notify=true" >> "$GITHUB_OUTPUT"
          else
            echo "notify=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Debug output
        run: |
          echo "today:               ${{ steps.dates.outputs.today }}"
          echo "onprem_release_date: ${{ steps.dates.outputs.onprem_release_date }}"
          echo "branchoff_date:      ${{ steps.dates.outputs.branchoff_date }}"
          echo "announcement_date:   ${{ steps.dates.outputs.announcement_date }}"
          echo "notify:              ${{ steps.dates.outputs.notify }}"
          echo "next_minor_release:  ${{ steps.next-version.outputs.next_minor }}"

      - name: Send Slack notification
        if: steps.dates.outputs.notify == 'true'
        run: |
          curl -s -X POST "${{ secrets.ANNOUNCE_MINOR_RELEASE_SLACK_WEBHOOK_URL }}" \
            -H 'Content-Type: application/json' \
            -d '{
              "onprem_release_date": "${{ steps.dates.outputs.onprem_release_date }}",
              "branchoff_date": "${{ steps.dates.outputs.branchoff_date }}",
              "next_minor_release": "${{ steps.next-version.outputs.next_minor }}"
            }'
