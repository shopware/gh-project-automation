name: Branch cleanup
on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  cleanup-old-branches:
    name: Cleanup old branches
    runs-on: ubuntu-latest
    strategy:
      matrix:
        repo: ["shopware", "shopware-private", "SwagCommercial", "Rufus", "saas"]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: octo-sts/action@f603d3be9d8dd9871a265776e625a27b00effe05 # v1.1.1
        id: octo-sts
        with:
          scope: shopware
          identity: BranchCleanup
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
      - run: npm ci
      - run: npm run build
      - uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          REPO: ${{ matrix.repo }}
          DRY_RUN: ${{ vars.BRANCH_CLEANUP_DRY_RUN }}
        with:
          github-token: ${{ steps.octo-sts.outputs.token }}
          script: |
            const { cleanupBranches, protectedReleaseBranchRegex } = await import('${{github.workspace}}/dist/index.mjs');
            await cleanupBranches({github, core, context}, process.env.REPO, "shopware", protectedReleaseBranchRegex)
